<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudySpace</title>
  <style>
    body { font-family: sans-serif; background: #fff5f8; margin: 0; padding: 20px; }
    body.dark-mode { background: #1a1a2e; color: #fff; }
    .nav { text-align: center; margin-bottom: 20px; }
    .nav button { padding: 10px; margin: 5px; cursor: pointer; }
    .content { display: none; }
    .content.active { display: block; }
    .box { background: #ecf0f1; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    body.dark-mode .box { background: #34495e; }
    input, textarea { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
    button { cursor: pointer; }
    #calcScreen { width: 100%; padding: 10px; font-size: 20px; text-align: right; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .grid button { padding: 10px; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <div class="nav">
    <button onclick="show('calc')">Calculator</button>
    <button onclick="show('tools')">Tools</button>
    <button onclick="show('student')">Student</button>
    <button onclick="show('grade')">Grades</button>
  </div>

  <!-- Calculator -->
  <div id="calc" class="content active box">
    <h3>Calculator</h3>
    <input type="text" id="calcScreen" readonly>
    <div class="grid">
      <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button onclick="press('/')">/</button>
      <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button onclick="press('*')">*</button>
      <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button onclick="press('-')">-</button>
      <button onclick="press('0')">0</button><button onclick="press('.')">.</button><button onclick="calculate()">=</button><button onclick="press('+')">+</button>
      <button onclick="clearCalc()">C</button><button onclick="press('!')">!</button><button onclick="press('π')">π</button><button onclick="press('e')">e</button>
    </div>
  </div>

  <!-- Tools -->
  <div id="tools" class="content box">
    <h3>Tools</h3>
    <button onclick="changeBg()">Change BG</button>
    <button onclick="toggleDark()">Dark Mode</button>
    <hr>
    <h4>Profile</h4>
    <img id="img" src="https://via.placeholder.com/150" width="100" onclick="nextImg()">
    <hr>
    <h4>Reminders</h4>
    <input type="text" id="remIn" placeholder="Add reminder">
    <button onclick="addRem()">Add</button>
    <ul id="remList"></ul>
  </div>

  <!-- Student -->
  <div id="student" class="content box">
    <h3>Student Info</h3>
    <p>Name: <span id="sName">John</span></p>
    <p>Age: <span id="sAge">18</span></p>
    <button onclick="updateS()">Update</button>
    <hr>
    <h4>Fees</h4>
    <input type="number" id="tuit" placeholder="Tuition">
    <input type="number" id="misc" placeholder="Misc">
    <button onclick="calcFees()">Total</button>
    <p id="feeRes"></p>
  </div>

  <!-- Grades -->
  <div id="grade" class="content box">
    <h3>Grade Calculator</h3>
    <button onclick="addQuiz()">+ Add Score</button>
    <div id="quizBox"></div>
    <button onclick="calcGrade()">Calculate Avg</button>
    <p id="gradeRes"></p>
  </div>

  <script>
    // Navigation
    function show(id) {
      document.querySelectorAll('.content').forEach(d => d.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // Calculator
    let expr = "";
    function press(v) { expr += v; document.getElementById("calcScreen").value = expr; }
    function clearCalc() { expr = ""; document.getElementById("calcScreen").value = ""; }
    function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
    function calculate() {
      try {
        let e = document.getElementById("calcScreen").value;
        e = e.replace(/π/g, "Math.PI").replace(/e/g, "Math.E").replace(/!/g, (m, n) => factorial(parseInt(n)));
        document.getElementById("calcScreen").value = eval(e);
        expr = "";
      } catch { document.getElementById("calcScreen").value = "Error"; }
    }

    // Tools
    function changeBg() {
      const c = ["#fff5f8", "#e0f7fa", "#fff3e0"];
      document.body.style.background = c[Math.floor(Math.random() * c.length)];
    }
    function toggleDark() { document.body.classList.toggle("dark-mode"); }
    function nextImg() {
      const imgs = ["https://via.placeholder.com/150/FF0000", "https://via.placeholder.com/150/00FF00"];
      document.getElementById("img").src = imgs[Math.floor(Math.random() * imgs.length)];
    }
    function addRem() {
      const val = document.getElementById("remIn").value;
      if(val) { const li = document.createElement("li"); li.textContent = val; document.getElementById("remList").appendChild(li); }
    }
    function updateS() {
      document.getElementById("sName").textContent = prompt("Name") || "John";
      document.getElementById("sAge").textContent = prompt("Age") || "18";
    }
    function calcFees() {
      const t = parseFloat(document.getElementById("tuit").value) || 0;
      const m = parseFloat(document.getElementById("misc").value) || 0;
      document.getElementById("feeRes").textContent = "Total: $" + (t + m).toFixed(2);
    }

    // Grades
    let qCount = 0;
    function addQuiz() {
      qCount++;
      const d = document.createElement("div");
      d.innerHTML = `<input type="number" id="q${qCount}" placeholder="Score">`;
      document.getElementById("quizBox").appendChild(d);
    }
    function calcGrade() {
      let sum = 0, cnt = 0;
      for(let i=1; i<=qCount; i++) {
        const v = parseFloat(document.getElementById("q"+i).value);
        if(!isNaN(v)) { sum += v; cnt++; }
      }
      document.getElementById("gradeRes").textContent = cnt ? "Avg: " + (sum/cnt).toFixed(2) : "No scores";
    }
  </script>
</body>
</html>
